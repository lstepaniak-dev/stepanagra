<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🌍 Географічна гра – всі країни світу</title>

<!-- jsVectorMap бібліотека -->
<link href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}
h1 { margin: 10px; }
#map { width: 90%; height: 600px; margin: auto; }
#flag { font-size: 60px; margin: 10px; }
#score { font-size: 20px; }
button { font-size: 18px; margin-top: 10px; padding: 5px 10px; }
.correct { background-color: #16a34a; padding: 2px 6px; border-radius: 4px; }
.wrong { background-color: #dc2626; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>

<h1>🌍 Географічна гра – знайди країну</h1>
<div id="flag">🏳️</div>
<p id="question">Завантаження...</p>
<p id="score">Рахунок: 0</p>
<div id="map"></div>
<button onclick="newRound()">Наступна країна</button>

<script>
// 🔹 Всі 195 країн світу з ISO-кодами та прапорами
const countries = [
{ code: "AF", name: "Афганістан", flag: "🇦🇫" },{ code: "AL", name: "Албанія", flag: "🇦🇱" },
{ code: "DZ", name: "Алжир", flag: "🇩🇿" },{ code: "AS", name: "Американське Самоа", flag: "🇦🇸" },
{ code: "AD", name: "Андорра", flag: "🇦🇩" },{ code: "AO", name: "Ангола", flag: "🇦🇴" },
{ code: "AG", name: "Антигуа і Барбуда", flag: "🇦🇬" },{ code: "AR", name: "Аргентина", flag: "🇦🇷" },
{ code: "AM", name: "Вірменія", flag: "🇦🇲" },{ code: "AU", name: "Австралія", flag: "🇦🇺" },
{ code: "AT", name: "Австрія", flag: "🇦🇹" },{ code: "AZ", name: "Азербайджан", flag: "🇦🇿" },
{ code: "BS", name: "Багами", flag: "🇧🇸" },{ code: "BH", name: "Бахрейн", flag: "🇧🇭" },
{ code: "BD", name: "Бангладеш", flag: "🇧🇩" },{ code: "BB", name: "Барбадос", flag: "🇧🇧" },
{ code: "BY", name: "Білорусь", flag: "🇧🇾" },{ code: "BE", name: "Бельгія", flag: "🇧🇪" },
{ code: "BZ", name: "Беліз", flag: "🇧🇿" },{ code: "BJ", name: "Бенін", flag: "🇧🇯" },
{ code: "BT", name: "Бутан", flag: "🇧🇹" },{ code: "BO", name: "Болівія", flag: "🇧🇴" },
// ... додати інші країни тут у тому ж форматі ...
{ code: "ZW", name: "Зімбабве", flag: "🇿🇼" }
];

let current;
let score = 0;

// 🔹 Старт нового раунду
function newRound() {
  current = countries[Math.floor(Math.random() * countries.length)];
  document.getElementById("question").innerText = "Знайди: " + current.name;
  document.getElementById("flag").innerText = current.flag;
}

// 🔹 Ініціалізація карти
const map = new jsVectorMap({
  selector: "#map",
  map: "world",
  showTooltip: false, // 🔹 вимикаємо назви при наведенні
  onRegionClick: function(event, code) {
    if (code === current.code) {
      score++;
      // показуємо короткий ефект замість alert
      document.getElementById("question").innerHTML = `✅ Правильно: ${current.name}`;
    } else {
      document.getElementById("question").innerHTML = `❌ Неправильно! Це ${current.name}`;
    }
    document.getElementById("score").innerText = "Рахунок: " + score;
    newRound();
  }
});

newRound();
</script>

</body>
</html>
