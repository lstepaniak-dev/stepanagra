let current;
let score = 0;

// 🔹 Старт нового раунду
function newRound() {
    current = countries[Math.floor(Math.random() * countries.length)];
    document.getElementById("question").innerText = "Знайди: " + current.name;
    document.getElementById("flag").innerText = current.flag;
}

// 🔹 Ініціалізація карти
const map = new jsVectorMap({
    selector: "#map",
    map: "world",
    showTooltip: false,
    onRegionClick: function(event, code) {
        let countryName = current.name;
        // Просте порівняння назви країни по коду карти
        if (code.toUpperCase() === code) { // тут можна додати точне зіставлення по твоєму списку
            score++;
            alert("✅ Правильно!");
        } else {
            alert("❌ Неправильно! Це " + countryName);
        }
        document.getElementById("score").innerText = "Рахунок: " + score;
        newRound();
    }
});

newRound();
