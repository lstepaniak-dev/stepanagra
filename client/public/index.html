<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🌍 Географічна гра</title>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
<link href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css" rel="stylesheet" />

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  margin: 10px;
}

#map {
  width: 90%;
  height: 500px;
  margin: auto;
}

#flag {
  font-size: 60px;
  margin: 10px;
}

#score {
  font-size: 20px;
}
</style>
</head>

<body>

<h1>🌍 Географічна гра</h1>
<div id="flag">🏳️</div>
<p id="question">Завантаження...</p>
<p id="score">Рахунок: 0</p>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>

<script>
const countries = [
  { code: "UA", name: "Україна", flag: "🇺🇦" },
  { code: "FR", name: "Франція", flag: "🇫🇷" },
  { code: "DE", name: "Німеччина", flag: "🇩🇪" },
  { code: "PL", name: "Польща", flag: "🇵🇱" },
  { code: "US", name: "США", flag: "🇺🇸" },
  { code: "IT", name: "Італія", flag: "🇮🇹" },
  { code: "ES", name: "Іспанія", flag: "🇪🇸" }
];

let current;
let score = 0;

function newRound() {
  current = countries[Math.floor(Math.random() * countries.length)];
  document.getElementById("question").innerText =
    "Знайди: " + current.name;
  document.getElementById("flag").innerText = current.flag;
}

const map = new jsVectorMap({
  selector: "#map",
  map: "world",
  onRegionClick: function(e, code) {

    if (code === current.code) {
      score++;
      alert("✅ Правильно!");
    } else {
      alert("❌ Неправильно!");
    }

    document.getElementById("score").innerText =
      "Рахунок: " + score;

    newRound();
  }
});

newRound();
</script>

</body>
</html>
