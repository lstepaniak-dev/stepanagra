<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Географічна гра</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  margin: 10px;
}

#score {
  font-size: 20px;
}

svg {
  width: 90%;
  height: 70vh;
  margin-top: 20px;
}

path {
  fill: #1e293b;
  stroke: white;
  cursor: pointer;
}

path:hover {
  fill: #38bdf8;
}

.correct {
  fill: green !important;
}

.wrong {
  fill: red !important;
}
</style>
</head>

<body>

<h1>🌍 Географічна гра</h1>
<p id="question">Завантаження...</p>
<p id="score">Рахунок: 0</p>

<svg viewBox="0 0 800 400">

  <path id="Ukraine" d="M400 200 L450 220 L430 260 L380 240 Z"></path>
  <path id="France" d="M300 220 L340 240 L320 280 L280 260 Z"></path>
  <path id="Germany" d="M350 180 L380 200 L360 240 L330 220 Z"></path>
  <path id="Poland" d="M400 150 L430 170 L410 200 L380 180 Z"></path>

</svg>

<script>
const countries = ["Ukraine", "France", "Germany", "Poland"];

const uaNames = {
  Ukraine: "Україна",
  France: "Франція",
  Germany: "Німеччина",
  Poland: "Польща"
};

let current;
let score = 0;

function newRound() {
  current = countries[Math.floor(Math.random() * countries.length)];
  document.getElementById("question").innerText =
    "Знайди: " + uaNames[current];
}

document.querySelectorAll("path").forEach(el => {
  el.addEventListener("click", () => {

    document.querySelectorAll("path").forEach(p =>
      p.classList.remove("correct", "wrong")
    );

    if (el.id === current) {
      score++;
      el.classList.add("correct");
    } else {
      el.classList.add("wrong");
    }

    document.getElementById("score").innerText =
      "Рахунок: " + score;

    setTimeout(newRound, 1000);
  });
});

newRound();
</script>

</body>
</html>
