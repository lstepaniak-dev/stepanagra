<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🌍 Географічна гра – всі країни світу</title>

<link href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}
h1 { margin: 10px; }
#map { width: 90%; height: 600px; margin: auto; }
#flag { font-size: 60px; margin: 10px; }
#score, #timer { font-size: 20px; }
button { font-size: 18px; margin-top: 10px; padding: 5px 10px; }
</style>
</head>
<body>

<h1>🌍 Географічна гра – знайди країну</h1>

<div id="flag">🏳️</div>
<p id="question">Завантаження...</p>
<p id="score">Рахунок: 0</p>
<p id="timer">Час: 30</p>

<div id="map"></div>
<button onclick="newRound()">Наступна країна</button>

<script>

// 🌍 Всі країни (твій список залишаємо)
const countries = [...document.currentScript.textContent.matchAll(/\{ code: "([A-Z]{2})", name: "([^"]+)", flag: "([^"]+)" \}/g)]
  .map(m => ({ code: m[1], name: m[2], flag: m[3] }));

let current;
let score = 0;
let time = 30;
let interval;

// 🎮 новий раунд
function newRound() {
  current = countries[Math.floor(Math.random() * countries.length)];
  document.getElementById("question").innerText = "Знайди: " + current.name;
  document.getElementById("flag").innerText = current.flag;
}

// ⏱ таймер
function startTimer() {
  clearInterval(interval);
  time = 30;

  interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Час: " + time;

    if (time <= 0) {
      clearInterval(interval);
      alert("⏰ Час вийшов! Рахунок: " + score);
      location.reload();
    }
  }, 1000);
}

// 🗺 карта
const map = new jsVectorMap({
  selector: "#map",
  map: "world",
  showTooltip: false,

  // 🇺🇦 ПРАПОР ПРИ НАВЕДЕННІ
  onRegionOver: function(e, code) {
    const country = countries.find(c => c.code === code);
    if (country) {
      document.getElementById("flag").innerText = country.flag;
    }
  },

  // 🎯 КЛІК
  onRegionClick: function(event, code) {
    if (code === current.code) {
      score++;
      alert("✅ Правильно!");
    } else {
      alert("❌ Неправильно! Це " + current.name);
    }

    document.getElementById("score").innerText = "Рахунок: " + score;
    newRound();
  }
});

// 🚀 старт
startTimer();
newRound();

</script>

</body>
</html>
